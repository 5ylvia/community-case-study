<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Dajeong</title>
    <script>
      // GitHub Pages SPA redirect
      // Redirects all 404s to index.html so React Router can handle them
      var path = window.location.pathname;
      window.location.replace(
        window.location.origin + '/community-case-study/' +
        '?redirect=' + encodeURIComponent(path)
      );
    </script>
  </head>
  <body></body>
</html>
