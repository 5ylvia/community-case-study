<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Dajeong</title>
    <script>
      // GitHub Pages SPA redirect
      var base = '/community-case-study';
      var path = window.location.pathname;
      var relative = path.startsWith(base) ? path.slice(base.length) : path;
      window.location.replace(
        window.location.origin + base + '?redirect=' + encodeURIComponent(relative || '/')
      );
    </script>
  </head>
  <body></body>
</html>
